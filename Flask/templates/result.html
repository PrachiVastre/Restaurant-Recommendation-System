<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Results - The_Element</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Inter', sans-serif;
    background-color: #F8FAFC;
    color: #0F172A;
}

.card {
    background: white;
    border: 1px solid #E5E7EB;
    border-radius: 16px;
}

.custom-table td {
    background: white;
    border-bottom: 1px solid #E5E7EB;
}
</style>
</head>

<body class="min-h-screen">

<!-- ✅ NEW NAVBAR -->
<nav class="px-8 py-8 border-b border-slate-100 flex justify-between items-center">
    <a href="/" class="font-extrabold uppercase tracking-tighter text-[#1E3A8A]">
        The_Element
    </a>
    <a href="/web" class="text-[10px] font-bold uppercase tracking-widest text-slate-400 hover:text-[#1E3A8A]">
        Back to Engine
    </a>
</nav>

<main class="px-8 py-10 max-w-7xl mx-auto w-full">

<h2 class="text-3xl font-semibold mb-4">Recommendations</h2>
<p class="text-gray-500 mb-8">Search: {{ search_term }}</p>

<div class="card p-4 mb-8 overflow-x-auto">
    {{ keyword | safe }}
</div>

<div class="grid grid-cols-1 lg:grid-cols-2 gap-8">

<div class="card p-6">
    <h3 class="text-lg font-semibold mb-4">Ratings Overview</h3>
    <canvas id="ratingsChart"></canvas>
</div>

<div class="card p-6">
    <h3 class="text-lg font-semibold mb-4">Cost Overview</h3>
    <canvas id="costChart"></canvas>
</div>

</div>

</main>

<script>
const names = {{ names | safe }};
const ratings = {{ ratings | safe }};
const cost = {{ cost | safe }};

new Chart(document.getElementById('ratingsChart'), {
    type: 'bar',
    data: {
        labels: names,
        datasets: [{
            data: ratings,
            backgroundColor: '#1E3A8A',
            borderRadius: 8
        }]
    },
    options: {
        plugins: { legend: { display: false } },
        scales: {
            y: { beginAtZero: true }
        }
    }
});

new Chart(document.getElementById('costChart'), {
    type: 'line',
    data: {
        labels: names,
        datasets: [{
            data: cost,
            borderColor: '#14B8A6',
            tension: 0.4,
            pointBackgroundColor: '#1E3A8A'
        }]
    },
    options: {
        plugins: { legend: { display: false } }
    }
});
</script>

</body>
</html>
