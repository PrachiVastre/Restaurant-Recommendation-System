<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The_Element | Culinary Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #ffffff; color: #0F172A; }
        .serif { font-family: 'Playfair Display', serif; }
        .hero-mesh {
            background-color: #ffffff;
            background-image: radial-gradient(at 0% 0%, rgba(30, 58, 138, 0.05) 0, transparent 50%), 
                              radial-gradient(at 100% 100%, rgba(20, 184, 166, 0.05) 0, transparent 50%);
        }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-15px); } }
        .float { animation: float 5s ease-in-out infinite; }
        .nav-link { position: relative; }
        .nav-link::after { content: ''; position: absolute; width: 0; height: 2px; bottom: -4px; left: 0; background-color: #1E3A8A; transition: width 0.3s; }
        .nav-link:hover::after { width: 100%; }
    </style>
</head>
<body class="min-h-screen flex flex-col hero-mesh">
    <nav class="px-8 py-8 flex justify-between items-center max-w-7xl mx-auto w-full">
        <span class="text-2xl font-extrabold tracking-tighter uppercase text-[#1E3A8A]">
            The <span class="text-slate-400">_</span> Element
        </span>
        <div class="flex items-center gap-8">
            <a href="/" class="nav-link text-xs font-bold uppercase tracking-widest text-black">Home</a>
            <a href="/web" class="nav-link text-xs font-bold text-slate-400 uppercase tracking-widest hover:text-[#1E3A8A]">Search Engine</a>
        </div>
    </nav>

    <main class="flex-grow flex flex-col lg:flex-row items-center justify-between px-8 max-w-7xl mx-auto w-full gap-16 py-12">
        <div class="lg:w-1/2">
            <div class="inline-block px-4 py-1.5 mb-6 border border-slate-200 rounded-full text-[10px] font-bold uppercase tracking-widest text-[#14B8A6]">
                AI-Algorithm Kitchen
            </div>
            
            <h1 class="text-6xl md:text-8xl font-bold leading-tight mb-8 serif italic text-black">
                Your Next <br><span class="text-[#1E3A8A]">Cravings, Curated.</span>
            </h1>
            
            <p class="text-slate-500 text-lg md:text-xl leading-relaxed mb-10 max-w-md font-light">
                Personalized dining discovery that knows your taste better than you do.
            </p>
            
            <a href="/web" class="inline-flex items-center justify-center px-10 py-5 bg-[#1E3A8A] text-white text-xs font-bold uppercase tracking-[0.2em] hover:bg-[#1e3a8aee] hover:scale-105 transition-all shadow-lg shadow-blue-900/20">
                Enter the Engine
            </a>
        </div>
        
        <div class="lg:w-1/2 relative">
            <div class="relative w-full aspect-square overflow-hidden rounded-2xl shadow-2xl float bg-slate-100">
                <img src="https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?q=80&w=1200&auto=format&fit=crop" 
                     class="w-full h-full object-cover transition-all duration-1000" 
                     alt="Restaurant Atmosphere"
                     crossorigin="anonymous">
            </div>
            
            <div class="absolute -bottom-10 -left-10 w-48 h-48 border-[12px] border-white shadow-xl hidden md:block bg-slate-200 overflow-hidden rounded-lg">
                <img src="https://images.unsplash.com/photo-1467003909585-2f8a72700288?q=80&w=600&auto=format&fit=crop" 
                     class="w-full h-full object-cover" 
                     alt="Gourmet Food Detail"
                     crossorigin="anonymous">
            </div>
        </div>
    </main>
</body>
</html>
