<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predicting - The_Element</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fafafa; }
        .input-minimal { border-bottom: 2px solid #e2e8f0; transition: border-color 0.4s; }
        .input-minimal:focus { outline: none; border-color: #1E3A8A; }
        #loader { display: none; position: fixed; inset: 0; background: white; z-index: 100; align-items: center; justify-content: center; }
        #loader.active { display: flex; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <div id="loader">
        <div class="text-center">
            <div class="w-12 h-12 border-4 border-slate-200 border-t-[#1E3A8A] rounded-full animate-spin mx-auto mb-4"></div>
            <p class="text-[10px] font-bold uppercase tracking-widest text-[#1E3A8A]">Analyzing Palate DNA</p>
        </div>
    </div>

    <nav class="px-8 py-8 flex justify-between items-center max-w-7xl mx-auto w-full">
        <a href="/" class="text-xl font-bold tracking-tighter uppercase text-[#1E3A8A]">The_Element</a>
        <div class="flex gap-6">
            <a href="/" class="text-[10px] font-bold uppercase tracking-widest text-slate-400 hover:text-[#1E3A8A]">Home</a>
            <a href="/web" class="text-[10px] font-bold uppercase tracking-widest border-b-2 border-[#1E3A8A] text-[#1E3A8A]">Predicting</a>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center px-6">
        <div class="w-full max-w-2xl text-center">
            <h1 class="text-4xl md:text-5xl font-extrabold mb-4 tracking-tight text-[#0F172A]">What do you crave?</h1>
            <p class="text-slate-500 mb-12 font-light">Enter a restaurant name to initialize similarity analysis.</p>

            <form action="/result" method="POST" autocomplete="off" id="search-form" class="relative">
                <input type="text" name="output" id="output" placeholder="Ex: Central Perk" 
                       class="w-full py-8 text-3xl font-light text-center bg-transparent input-minimal mb-8 text-[#1E3A8A]">
                
                <div id="suggestions" class="hidden absolute w-full z-50 glass rounded-xl shadow-2xl border border-slate-100 mt-[-20px]"></div>
                
                <button type="submit" class="w-full py-5 bg-[#1E3A8A] text-white text-xs font-bold uppercase tracking-[0.3em] hover:bg-[#14B8A6] transition-all shadow-lg shadow-blue-900/20">
                    Generate Insights
                </button>
            </form>
        </div>
    </main>

    <script>
        const inputField = document.getElementById('output');
        const suggestionsBox = document.getElementById('suggestions');
        const form = document.getElementById('search-form');
        const loader = document.getElementById('loader');

        form.addEventListener('submit', () => { loader.classList.add('active'); });

        inputField.addEventListener('input', async function() {
            const val = this.value;
            if (!val) return suggestionsBox.classList.add('hidden');
            const res = await fetch(`/autocomplete?term=${val}`);
            const data = await res.json();
            suggestionsBox.innerHTML = "";
            suggestionsBox.classList.remove('hidden');
            data.forEach(item => {
                let div = document.createElement("div");
                div.innerHTML = item;
                div.className = "px-6 py-4 cursor-pointer hover:bg-slate-50 text-sm font-medium border-b border-slate-50 last:border-0 hover:text-[#1E3A8A]";
                div.onclick = () => { inputField.value = item; suggestionsBox.innerHTML = ""; };
                suggestionsBox.appendChild(div);
            });
        });
    </script>
</body>
</html>
